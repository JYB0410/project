<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <title>관리자 | 펫함께 가이드</title>
</head>
<body class="admin-body">
  <div id="admin-login" class="admin-login-wrap">
    <div class="admin-login-box">
      <h1>펫함께 관리자</h1>
      <p class="notice">운영자 전용 콘텐츠 관리 화면입니다. 승인된 계정으로 로그인하세요.</p>
      <p id="login-error" class="login-error hidden" role="alert"></p>
      <form id="login-form">
        <label for="admin-password">비밀번호</label>
        <input type="password" id="admin-password" placeholder="비밀번호 입력" autocomplete="current-password" required minlength="8">
        <button type="submit" class="admin-btn" style="width:100%">로그인</button>
      </form>
      <p id="setup-notice" class="notice hidden" style="margin-top:1rem"></p>
      <p class="notice"><a href="../index.html">← 사이트로 돌아가기</a></p>
    </div>
  </div>

  <div id="admin-app" class="admin-layout hidden">
    <aside id="admin-sidebar" class="admin-sidebar"></aside>
    <div>
      <div class="admin-topbar">
        <strong>펫함께 가이드 · 관리자</strong>
        <div>
          <a href="../index.html" class="admin-btn secondary" style="text-decoration:none;display:inline-block">사이트 보기</a>
          <button type="button" id="logout-btn" class="admin-btn secondary">로그아웃</button>
        </div>
      </div>
      <main id="admin-main" class="admin-main"></main>
    </div>
  </div>

  <script src="../data/site.config.js?v=34-2026-07-08"></script>
  <script src="../data/categories.js?v=34-2026-07-08"></script>
  <script src="../data/posts.js?v=34-2026-07-08"></script>
  <script src="../data/columns.js?v=34-2026-07-08"></script>
  <script src="../assets/js/sanitize.js"></script>
  <script src="../assets/js/data-store.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
