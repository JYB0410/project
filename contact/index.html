<body data-page="contact">
  <div id="site-header"></div>
  <main class="container page-main">
    <header class="page-hero">
      <h1>문의하기</h1>
      <p class="hero-lead">문의는 이메일로 받고 있습니다.</p>
    </header>
    <div class="page-content">
      <p>콘텐츠 오류 제보, 제안, 일반 문의는 아래 이메일로 연락해 주세요.</p>
      <p><strong>이메일:</strong> <a id="contact-email" href="mailto:onhopetoj@gmail.com">onhopetoj@gmail.com</a></p>

      <h2>문의 양식</h2>
      <p class="form-note">아래 양식은 메일 앱을 여는 용도입니다. 서버로 직접 전송되지 않습니다.</p>
      <form id="contact-form" class="contact-form">
        <label>이름
          <input type="text" name="name" required autocomplete="name">
        </label>
        <label>이메일
          <input type="email" name="email" required autocomplete="email">
        </label>
        <label>문의 내용
          <textarea name="message" rows="6" required></textarea>
        </label>
        <button type="submit" class="btn btn-primary">메일 앱으로 보내기</button>
      </form>
    </div>
  </main>
  <div id="site-footer"></div>
